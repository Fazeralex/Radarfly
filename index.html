<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radar GCLP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --primary:#00ff41; --grid:#00661a; --txt:#00ff41; --bg:#04070a;
    --salida:#3cf27a; --llegada:#ffb020; --ruta:#00ff41; --tierra:#7a8a99;
    --panel:rgba(255,255,255,.04); --line:rgba(255,255,255,.10);
    --mono: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,"Liberation Mono",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:var(--mono);-webkit-font-smoothing:antialiased;overflow:hidden;
    -webkit-tap-highlight-color:transparent;user-select:none;}
  #app{display:flex;flex-direction:column;height:100%}
  /* top bar */
  header{display:flex;align-items:center;gap:14px;padding:8px 14px;
    border-bottom:1px solid var(--line);background:rgba(0,0,0,.35);flex:0 0 auto}
  header .brand{font-weight:700;letter-spacing:3px;font-size:15px;color:var(--primary);
    text-shadow:0 0 8px var(--primary)}
  header .brand small{display:block;font-size:9px;letter-spacing:2px;opacity:.6;font-weight:400}
  header .status{font-size:11px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  header .live{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:2px}
  .dot{width:9px;height:9px;border-radius:50%;background:#ff3b3b;box-shadow:0 0 8px #ff3b3b;animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:.15}}
  /* main */
  main{flex:1 1 auto;display:flex;min-height:0}
  #stage{flex:1 1 auto;position:relative;min-width:0;background:radial-gradient(circle at 50% 45%,rgba(255,255,255,.03),transparent 60%)}
  #scopeWrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  canvas#scope{max-width:100%;max-height:100%;touch-action:none}
  #map{position:absolute;inset:0;display:none;background:#04070a}
  .leaflet-container{background:#04070a;font-family:var(--mono)}
  /* side panel */
  aside{flex:0 0 288px;border-left:1px solid var(--line);display:flex;flex-direction:column;
    background:rgba(0,0,0,.35);min-height:0}
  .hud{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);
    border-bottom:1px solid var(--line)}
  .hud .cell{background:var(--bg);padding:8px 4px;text-align:center}
  .hud .num{font-size:20px;font-weight:700;line-height:1}
  .hud .lbl{font-size:8px;letter-spacing:1px;opacity:.6;margin-top:3px}
  .hud .s-t .num{color:var(--txt)} .hud .s-s .num{color:var(--salida)}
  .hud .s-l .num{color:var(--llegada)} .hud .s-r .num{color:var(--primary)}
  .filters{display:flex;gap:0;border-bottom:1px solid var(--line)}
  .filters button{flex:1;background:transparent;border:0;border-right:1px solid var(--line);
    color:var(--txt);font-family:var(--mono);font-size:10px;letter-spacing:.5px;padding:7px 2px;opacity:.5;cursor:pointer}
  .filters button:last-child{border-right:0}
  .filters button.on{opacity:1;background:var(--panel);box-shadow:inset 0 -2px 0 var(--primary)}
  .list{flex:1 1 auto;overflow-y:auto;min-height:60px}
  .list .row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.05);
    cursor:pointer;font-size:12px}
  .list .row:hover{background:var(--panel)}
  .list .row.sel{background:var(--panel);box-shadow:inset 3px 0 0 var(--primary)}
  .list .row .cs{font-weight:700;flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .list .row .meta{font-size:10px;opacity:.6;text-align:right;white-space:nowrap}
  .tag{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .list .empty{padding:22px 12px;text-align:center;font-size:11px;opacity:.5;line-height:1.6}
  /* detail card */
  .detail{border-top:1px solid var(--line);background:rgba(0,0,0,.5);max-height:44%;overflow-y:auto;display:none}
  .detail.show{display:block}
  .detail .dh{display:flex;align-items:center;gap:8px;padding:9px 10px;border-bottom:1px solid var(--line)}
  .detail .dh .cs{font-size:15px;font-weight:700;letter-spacing:1px}
  .detail .dh .x{margin-left:auto;background:none;border:0;color:var(--txt);opacity:.6;font-size:16px;cursor:pointer;padding:2px 6px}
  .detail .grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
  .detail .g{background:var(--bg);padding:6px 9px}
  .detail .g .k{font-size:8px;letter-spacing:1px;opacity:.55}
  .detail .g .v{font-size:13px;margin-top:2px}
  .detail .say{width:100%;border:0;border-top:1px solid var(--line);background:var(--panel);color:var(--txt);
    font-family:var(--mono);font-size:12px;letter-spacing:1px;padding:10px;cursor:pointer}
  .detail .say:active{background:var(--primary);color:#000}
  /* bottom controls */
  footer{flex:0 0 auto;display:flex;flex-wrap:wrap;align-items:center;gap:8px 14px;padding:9px 14px;
    border-top:1px solid var(--line);background:rgba(0,0,0,.4);font-size:11px}
  footer .grp{display:flex;align-items:center;gap:7px}
  footer label{opacity:.6;letter-spacing:1px}
  .seg{display:flex;border:1px solid var(--line);border-radius:4px;overflow:hidden}
  .seg button{background:transparent;border:0;color:var(--txt);font-family:var(--mono);font-size:11px;
    padding:5px 11px;cursor:pointer;opacity:.55}
  .seg button.on{opacity:1;background:var(--primary);color:#000;font-weight:700}
  select,input[type=range]{font-family:var(--mono)}
  select{background:#0a1016;color:var(--txt);border:1px solid var(--line);border-radius:4px;padding:4px 6px;font-size:11px}
  input[type=range]{width:120px;accent-color:var(--primary)}
  .btn{background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:4px;
    padding:5px 10px;font-family:var(--mono);font-size:11px;letter-spacing:1px;cursor:pointer}
  .btn.on{background:var(--primary);color:#000;font-weight:700;border-color:var(--primary)}
  .btn:active{transform:translateY(1px)}
  .rng-val{min-width:52px;text-align:right}
  /* toast */
  #toast{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);background:rgba(0,0,0,.85);
    border:1px solid var(--primary);color:var(--txt);padding:9px 16px;border-radius:6px;font-size:12px;
    max-width:80%;text-align:center;opacity:0;transition:opacity .3s;pointer-events:none;z-index:900}
  #toast.show{opacity:1}
  @media (max-width:820px){
    main{flex-direction:column}
    aside{flex:0 0 auto;max-height:42%;border-left:0;border-top:1px solid var(--line);flex-direction:column}
    .detail{max-height:none}
    footer{font-size:10px;gap:6px 10px}
    input[type=range]{width:90px}
  }
  @media (prefers-reduced-motion:reduce){.dot{animation:none}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">RADAR·GCLP<small id="loc">Gran Canaria</small></div>
    <div class="status" id="statusLine">Iniciando…</div>
    <div class="live"><span class="dot" id="liveDot"></span><span id="liveTxt">EN VIVO</span></div>
  </header>

  <main>
    <div id="stage">
      <div id="scopeWrap"><canvas id="scope" width="640" height="640"></canvas></div>
      <div id="map"></div>
      <div id="toast"></div>
    </div>

    <aside>
      <div class="hud">
        <div class="cell s-t"><div class="num" id="cTot">0</div><div class="lbl">TOTAL</div></div>
        <div class="cell s-s"><div class="num" id="cSal">0</div><div class="lbl">SALIDAS</div></div>
        <div class="cell s-l"><div class="num" id="cLle">0</div><div class="lbl">LLEGADAS</div></div>
        <div class="cell s-r"><div class="num" id="cRut">0</div><div class="lbl">EN RUTA</div></div>
      </div>
      <div id="sessLine" style="padding:5px 10px;border-bottom:1px solid var(--line);font-size:10px;opacity:.65;letter-spacing:.4px">SESIÓN: —</div>
      <div class="filters" id="filters">
        <button data-f="all" class="on">TODOS</button>
        <button data-f="salida">SALIDAS</button>
        <button data-f="llegada">LLEGADAS</button>
        <button data-f="ruta">RUTA</button>
      </div>
      <div class="list" id="list"><div class="empty">Buscando tráfico…</div></div>
      <div class="detail" id="detail"></div>
    </aside>
  </main>

  <footer>
    <div class="grp">
      <div class="seg" id="viewSeg">
        <button data-v="scope" class="on">SCOPE</button>
        <button data-v="map">MAPA</button>
      </div>
    </div>
    <div class="grp">
      <label>ALCANCE</label>
      <input type="range" id="rangeSlider" min="25" max="300" step="5" value="80">
      <span class="rng-val" id="rangeVal">80 km</span>
    </div>
    <div class="grp">
      <label>TEMA</label>
      <select id="themeSel"></select>
    </div>
    <div class="grp">
      <label>ALERTA</label>
      <select id="alertSel">
        <option value="0">OFF</option><option value="3">≤3 km</option>
        <option value="5">≤5 km</option><option value="10">≤10 km</option>
        <option value="20">≤20 km</option><option value="40">≤40 km</option>
      </select>
    </div>
    <div class="grp">
      <button class="btn on" id="soundBtn">SONIDO ◑</button>
      <input type="range" id="volSlider" min="0" max="3" step="1" value="2" title="Volumen">
    </div>
    <div class="grp">
      <button class="btn on" id="voiceBtn">VOZ</button>
      <button class="btn" id="sweepBtn">BARRIDO</button>
      <button class="btn" id="nightBtn">🌙 AUTO</button>
      <button class="btn" id="locBtn">◎ UBÍCAME</button>
      <button class="btn" id="fsBtn">⛶ CUADRO</button>
    </div>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
"use strict";
/* ===================== Radar GCLP — single-file web radar =====================
   Datos: red comunitaria ADS-B (adsb.lol / airplanes.live), sin cuenta ni API key.
   Clasifica salidas / llegadas / en ruta respecto al aeropuerto de Gran Canaria.
============================================================================== */

// ---- constantes de sitio ----
const GCLP   = { lat: 27.9319, lon: -15.3866, name: "GCLP" };        // Aeropuerto de Gran Canaria (Gando)
const HOME_DEFAULT = { lat: 27.8450, lon: -15.4390, name: "Vecindario" }; // Sardina / Vecindario aprox.

// ---- almacenamiento seguro (localStorage con fallback a memoria) ----
const _mem = {};
const store = {
  get(k, d){ try{ const v = localStorage.getItem(k); return v===null? d : JSON.parse(v);}catch(e){ return (k in _mem)?_mem[k]:d; } },
  set(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){ _mem[k]=v; } }
};

// ---- temas (25) : primary=blips/sweep, grid=anillos, txt=texto ----
const THEMES = [
  ["Classic Green","#00ff41","#0b4d1c","#00ff41"],
  ["Retro Amber","#ffb000","#5a3c00","#ffb000"],
  ["Cyberpunk","#ff2fb9","#3a0a52","#00ffff"],
  ["Stealth Red","#ff2a2a","#4d0000","#ff7a7a"],
  ["Ocean Blue","#29d0ff","#01374f","#ffffff"],
  ["Neon Cyber","#eaff00","#2f0a45","#ff44cc"],
  ["Synthwave","#ff2fd0","#26093f","#21e6ff"],
  ["Electric Cyan","#00ffe1","#013844","#00ffe1"],
  ["Sunset Orange","#ff6a1a","#3f1500","#ffd9b0"],
  ["Military Sonar","#4dff88","#0a3d1f","#8fe6d0"],
  ["Deep Sea Naval","#3a7bff","#001a4d","#9fc0ff"],
  ["Ultraviolet","#b026ff","#26004d","#dd9cff"],
  ["Tactical Grey","#d0d6dd","#333a42","#ffffff"],
  ["Danger Zone","#39ff5a","#0a3d14","#ff3232"],
  ["Matrix Code","#00ff66","#06381a","#00ffe1"],
  ["Gold Platinum","#ffd24a","#123a5b","#9fe0ff"],
  ["Alien Toxic","#b6ff00","#213d0a","#ffee33"],
  ["Crimson Alert","#ff1a1a","#3d0808","#ffd0d0"],
  ["High Contrast","#ffffff","#39404a","#00ff66"],
  ["Pastel Peach","#ffb37a","#4d2f1e","#ffcfa8"],
  ["Sky Radar","#9fd8ff","#25415c","#ffffff"],
  ["Mint Mint","#7dffce","#1a4a3a","#7dffce"],
  ["Sakura Night","#ff9ec8","#33192b","#fff0a0"],
  ["Monochrome","#ffffff","#20272f","#ffffff"],
  ["Cyber Gold","#29d8ff","#123a5b","#ffd24a"]
];
const STATUS_COLOR = { salida:"#3cf27a", llegada:"#ffb020", ruta:null, tierra:"#7a8a99" };

// ---- aerolíneas: prefijo OACI del callsign (3 letras) -> nombre ----
const AIRLINES = {
  // Canarias / España
  IBB:"Binter Canarias", NAY:"Binter Canarias (Naysa)", CNF:"Canaryfly",
  IBE:"Iberia", IBS:"Iberia Express",
  ANE:"Air Nostrum", ANS:"Air Nostrum", AEA:"Air Europa", VLG:"Vueling",
  VOE:"Volotea", LVL:"LEVEL", IBJ:"Iberojet", EVE:"Iberojet", PUE:"Plus Ultra",
  WFL:"World2Fly", PLM:"Wamos Air",
  // bajo coste / vacacional Europa
  RYR:"Ryanair", RUK:"Ryanair UK", EZY:"easyJet", EZS:"easyJet Switzerland",
  EJU:"easyJet Europe", EXS:"Jet2", TOM:"TUI Airways", TUI:"TUI fly",
  TFL:"TUI fly", BLX:"TUI fly Nordic", THD:"TUI fly", JAF:"TUI fly Belgium",
  CFG:"Condor", EWG:"Eurowings", EWE:"Eurowings Europe", NAX:"Norwegian",
  NOZ:"Norwegian", NSZ:"Norwegian", WZZ:"Wizz Air", WMT:"Wizz Air Malta",
  WUK:"Wizz Air UK", TRA:"Transavia", TVF:"Transavia France", VKG:"Sunclass",
  SXS:"SunExpress", PGT:"Pegasus",
  // red / bandera
  DLH:"Lufthansa", CLH:"Lufthansa CityLine", AFR:"Air France", KLM:"KLM",
  BAW:"British Airways", SHT:"British Airways", VIR:"Virgin Atlantic",
  TAP:"TAP Air Portugal", SWR:"Swiss", EDW:"Edelweiss", AUA:"Austrian",
  BEL:"Brussels Airlines", SAS:"SAS", FIN:"Finnair", EIN:"Aer Lingus",
  ICE:"Icelandair", LOT:"LOT", THY:"Turkish Airlines", DAL:"Delta",
  UAL:"United", AAL:"American", ACA:"Air Canada",
  // intercontinental / África / Oriente Medio
  QTR:"Qatar Airways", UAE:"Emirates", ETD:"Etihad", RAM:"Royal Air Maroc",
  DAH:"Air Algérie", MSR:"EgyptAir", TAR:"Tunisair",
  // carga
  BCS:"DHL", DHK:"DHL Air", GEC:"Lufthansa Cargo", CLX:"Cargolux",
  FDX:"FedEx", UPS:"UPS", ABR:"ASL Airlines"
};
function airline(cs){
  const p=(cs||"").trim().slice(0,3).toUpperCase();
  return /^[A-Z]{3}$/.test(p) ? (AIRLINES[p]||"") : "";
}

// ---- estado ----
const S = {
  home: store.get("home", HOME_DEFAULT),
  rangeKm: store.get("range", 80),
  themeIdx: store.get("theme", 0),
  sound: store.get("sound", true),
  vol: store.get("vol", 2),
  voice: store.get("voice", true),
  sweep: store.get("sweep", true),
  view: store.get("view", "scope"),
  filter: "all",
  planes: [],           // aviones actuales (crudos + calculados)
  byHex: {},            // hex -> plane
  selected: null,       // hex seleccionado
  seenHex: new Set(),   // para detectar contactos nuevos
  srcUsed: [],          // redes que respondieron en el último sondeo
  trails: {},           // hex -> [{lat,lon}, ...] últimas posiciones
  alertKm: store.get("alertKm", 0),   // 0 = alerta de cercanía apagada
  alertedHex: new Set(),              // ya avisados dentro de la zona
  nightAuto: store.get("nightAuto", false),
  dayThemeIdx: store.get("dayTheme", store.get("theme", 0)),
  nightApplied: false,
  stats: { contacts:new Set(), salidas:new Set(), llegadas:new Set(), closest:null },
  lastOk: 0,
  sweepAngle: 0,        // grados
  pingedThisTurn: {}    // hex -> bool, para el ping del barrido
};

// ---- helpers geo ----
const R_EARTH = 6371;
const toRad = d => d*Math.PI/180, toDeg = r => r*180/Math.PI;
function distKm(a, b){
  const dLat=toRad(b.lat-a.lat), dLon=toRad(b.lon-a.lon);
  const s=Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLon/2)**2;
  return 2*R_EARTH*Math.asin(Math.sqrt(s));
}
function bearing(a, b){
  const y=Math.sin(toRad(b.lon-a.lon))*Math.cos(toRad(b.lat));
  const x=Math.cos(toRad(a.lat))*Math.sin(toRad(b.lat))-Math.sin(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.cos(toRad(b.lon-a.lon));
  return (toDeg(Math.atan2(y,x))+360)%360;
}

// ---- clasificación salida / llegada / ruta ----
function classify(p){
  const alt = (typeof p.alt === "number") ? p.alt : null;      // pies
  const rate = (typeof p.rate === "number") ? p.rate : 0;      // pies/min
  const dG = p.distGCLP;
  if(p.onGround) return "tierra";
  if(dG < 60 && (alt===null || alt < 13000)){
    if(rate > 250)  return "salida";
    if(rate < -250) return "llegada";
    // cerca y a baja cota sin régimen claro: usa el rumbo relativo al aeropuerto
    const brgToApt = bearing({lat:p.lat,lon:p.lon}, GCLP);
    let diff = Math.abs(((p.track != null ? p.track : brgToApt) - brgToApt + 540)%360 - 180);
    return diff < 90 ? "llegada" : "salida";   // se acerca=llegada, se aleja=salida
  }
  return "ruta";
}

// ---- fuentes de datos ----------------------------------------------------
// Redes comunitarias SIN cuenta ni API key. Se consultan TODAS a la vez y se
// fusionan los aviones (sin duplicados). Si alguna falla (p.ej. por CORS),
// simplemente se ignora y siguen las demás.
const nmFromKm = km => Math.min(250, Math.max(1, Math.round(km/1.852)));

// OpenSky NECESITA un proxy propio por el CORS del navegador (no da cabeceras
// CORS). Deja esto vacío para no usarlo. Si algún día montas el Cloudflare
// Worker de 3 líneas, pon aquí su URL (que reenvíe a opensky-network.org) y
// OpenSky se sumará automáticamente a la fusión, sin cuenta (modo anónimo).
const OPENSKY_PROXY = "";  // ej: "https://mi-worker.midominio.workers.dev/"

const acList = j => j.ac || j.aircraft || [];
const SOURCES = [
  { name:"adsb.lol",       url:(la,lo,nm)=>`https://api.adsb.lol/v2/point/${la}/${lo}/${nm}`,               parse:acList },
  { name:"airplanes.live", url:(la,lo,nm)=>`https://api.airplanes.live/v2/point/${la}/${lo}/${nm}`,         parse:acList },
  { name:"adsb.one",       url:(la,lo,nm)=>`https://api.adsb.one/v2/point/${la}/${lo}/${nm}`,               parse:acList },
  { name:"adsb.fi",        url:(la,lo,nm)=>`https://opendata.adsb.fi/api/v3/lat/${la}/lon/${lo}/dist/${nm}`, parse:acList }
];
if(OPENSKY_PROXY){
  SOURCES.push({ name:"opensky", parse:parseOpenSky,
    url:(la,lo,nm)=>{ const d=nm/60; // grados aprox
      const b=`lamin=${(+la-d).toFixed(3)}&lomin=${(+lo-d/Math.cos(la*Math.PI/180)).toFixed(3)}&lamax=${(+la+d).toFixed(3)}&lomax=${(+lo+d/Math.cos(la*Math.PI/180)).toFixed(3)}`;
      return OPENSKY_PROXY.replace(/\/$/,"") + "/api/states/all?" + b; } });
}
// OpenSky devuelve otro formato: lo convierto a objetos tipo ADSBExchange
function parseOpenSky(j){
  const out=[];
  for(const s of (j.states||[])){
    if(s[5]==null || s[6]==null) continue;
    out.push({ hex:s[0], flight:(s[1]||"").trim(), lat:s[6], lon:s[5],
      alt_baro: s[8] ? "ground" : (s[7]!=null? Math.round(s[7]*3.28084): null),
      gs: s[9]!=null? +(s[9]*1.94384).toFixed(0): null,
      track: s[10]!=null? s[10]: null,
      baro_rate: s[11]!=null? Math.round(s[11]*196.85): 0,
      squawk: s[14]||"", r:"", t:"" });
  }
  return out;
}

async function fetchSource(src, la, lo, nm){
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),8000);
  try{
    const r=await fetch(src.url(la,lo,nm), {signal:ctrl.signal, cache:"no-store"});
    clearTimeout(t);
    if(!r.ok) throw new Error("HTTP "+r.status);
    const j=await r.json();
    return { name:src.name, ac:src.parse(j)||[] };
  }catch(e){ clearTimeout(t); return { name:src.name, ac:null }; }
}

async function poll(){
  const la=S.home.lat.toFixed(4), lo=S.home.lon.toFixed(4), nm=nmFromKm(S.rangeKm);
  try{
    const results = await Promise.all(SOURCES.map(s=>fetchSource(s,la,lo,nm)));
    const ok = results.filter(r=>r.ac!==null);
    // fusiona por hex, quedándose con la posición más fresca
    const merged={};
    for(const r of ok) for(const a of r.ac){
      if(!a || !a.hex) continue;
      const prev=merged[a.hex];
      const hasPos = typeof a.lat==="number" && typeof a.lon==="number";
      const seen = typeof a.seen_pos==="number"? a.seen_pos : 999;
      if(!prev){ merged[a.hex]={a,seen,hasPos}; }
      else if((hasPos&&!prev.hasPos) || (hasPos===prev.hasPos && seen<prev.seen)){ merged[a.hex]={a,seen,hasPos}; }
    }
    const list=Object.values(merged).map(x=>x.a);
    S.srcUsed = ok.map(r=>r.name);
    if(ok.length){ S.lastOk=Date.now(); setLive(true); ingest(list); }
    else if(Date.now()-S.lastOk>20000){
      setLive(false);
      setStatus(`Ninguna red respondió. Puede ser el CORS del navegador: prueba a servir la herramienta desde una web (GitHub Pages) en vez de abrirla como archivo local, o revisa la conexión.`);
    }
  }catch(e){ /* nunca debería llegar aquí */ }
  finally{ setTimeout(poll, 7000); }
}

function ingest(ac){
  const planes = [];
  const by = {};
  for(const a of ac){
    if(typeof a.lat !== "number" || typeof a.lon !== "number") continue;
    const ground = (a.alt_baro === "ground");
    const alt = ground ? 0 : (typeof a.alt_baro === "number" ? a.alt_baro : null);
    const p = {
      hex: a.hex,
      cs: (a.flight||"").trim() || "—",
      reg: a.r || "", type: a.t || "",
      lat: a.lat, lon: a.lon,
      alt, onGround: ground,
      gs: (typeof a.gs==="number")? a.gs : null,       // nudos
      track: (typeof a.track==="number")? a.track : (typeof a.true_heading==="number"?a.true_heading:null),
      rate: (typeof a.baro_rate==="number")? a.baro_rate : (typeof a.geom_rate==="number"?a.geom_rate:0),
      squawk: a.squawk || "",
      cat: a.category || ""
    };
    p.distMe   = distKm(S.home, p);
    p.brgMe    = bearing(S.home, p);
    p.distGCLP = distKm(GCLP, p);
    if(p.distMe > S.rangeKm) continue;                 // recorta al alcance elegido
    p.status = classify(p);
    planes.push(p); by[p.hex] = p;
  }
  // contactos nuevos -> beep
  for(const p of planes){
    if(!S.seenHex.has(p.hex)){ S.seenHex.add(p.hex); if(S.lastOk) beep("new"); }
  }
  // estelas: guarda las últimas posiciones de cada avión
  for(const p of planes){
    const t=S.trails[p.hex]||(S.trails[p.hex]=[]);
    const last=t[t.length-1];
    if(!last || last.lat!==p.lat || last.lon!==p.lon) t.push({lat:p.lat,lon:p.lon});
    if(t.length>18) t.shift();
  }
  // estadísticas de sesión
  for(const p of planes){
    S.stats.contacts.add(p.hex);
    if(p.status==="salida")  S.stats.salidas.add(p.hex);
    if(p.status==="llegada") S.stats.llegadas.add(p.hex);
    if(!p.onGround && (!S.stats.closest || p.distMe<S.stats.closest.km)){
      S.stats.closest={ km:p.distMe, cs:p.cs };
    }
  }
  // alerta de cercanía (con histéresis para no repetir)
  if(S.alertKm>0){
    for(const p of planes){
      if(p.onGround) continue;
      if(p.distMe<=S.alertKm && !S.alertedHex.has(p.hex)){
        S.alertedHex.add(p.hex);
        beep("new"); setTimeout(()=>beep("new"),220);      // doble pitido
        const al=airline(p.cs);
        toast(`⚠ ${al||p.cs} a ${p.distMe.toFixed(1)} km`);
        if(S.voice){ try{ speechSynthesis.cancel();
          const u=new SpeechSynthesisUtterance(`Atención. ${al?al+", ":""}${p.cs==="—"?"tráfico":p.cs}, a ${p.distMe.toFixed(0)} kilómetros.`);
          u.lang="es-ES"; speechSynthesis.speak(u); }catch(e){} }
      }else if(p.distMe>S.alertKm+3){ S.alertedHex.delete(p.hex); }
    }
  }
  // limpia hex que ya no están (para futuros "nuevos")
  const alive = new Set(planes.map(p=>p.hex));
  for(const h of Array.from(S.seenHex)) if(!alive.has(h)) S.seenHex.delete(h);
  for(const h of Object.keys(S.trails)) if(!alive.has(h)) delete S.trails[h];
  for(const h of Array.from(S.alertedHex)) if(!alive.has(h)) S.alertedHex.delete(h);

  planes.sort((a,b)=>a.distMe-b.distMe);
  S.planes = planes; S.byHex = by;
  if(S.selected && !by[S.selected]) closeDetail();
  renderPanel();
  if(S.view==="map") drawMap();
}

// ============================ SCOPE (canvas) ============================
const cv = document.getElementById("scope"), cx2d = cv.getContext("2d");
function sizeScope(){
  const wrap = document.getElementById("scopeWrap");
  const s = Math.max(240, Math.min(wrap.clientWidth, wrap.clientHeight) - 8);
  const dpr = window.devicePixelRatio||1;
  cv.width = s*dpr; cv.height = s*dpr; cv.style.width=s+"px"; cv.style.height=s+"px";
  cx2d.setTransform(dpr,0,0,dpr,0,0);
  cv._s = s;
}
function scopePos(p){
  const s=cv._s, cx=s/2, cy=s/2, maxR=s/2-18;
  const r=(p.distMe/S.rangeKm)*maxR, a=toRad(p.brgMe);
  return { x:cx+r*Math.sin(a), y:cy-r*Math.cos(a) };
}
function drawScope(){
  const th=THEMES[S.themeIdx], primary=th[1], grid=th[2], txt=th[3];
  const s=cv._s, cx=s/2, cy=s/2, maxR=s/2-18;
  cx2d.clearRect(0,0,s,s);
  // anillos
  cx2d.lineWidth=1; cx2d.strokeStyle=grid; cx2d.fillStyle=grid;
  cx2d.font="10px "+getComputedStyle(document.body).fontFamily;
  for(let i=1;i<=4;i++){
    const r=maxR*i/4;
    cx2d.globalAlpha=.9; cx2d.beginPath(); cx2d.arc(cx,cy,r,0,7); cx2d.stroke();
    cx2d.globalAlpha=.55; cx2d.fillText(Math.round(S.rangeKm*i/4)+"km", cx+4, cy-r+11);
  }
  cx2d.globalAlpha=1;
  // cruz + rumbos
  cx2d.beginPath(); cx2d.moveTo(cx,cy-maxR); cx2d.lineTo(cx,cy+maxR);
  cx2d.moveTo(cx-maxR,cy); cx2d.lineTo(cx+maxR,cy); cx2d.stroke();
  cx2d.fillStyle=txt; cx2d.globalAlpha=.7; cx2d.textAlign="center";
  cx2d.fillText("N",cx,cy-maxR-4); cx2d.fillText("S",cx,cy+maxR+11);
  cx2d.fillText("E",cx+maxR+8,cy+4); cx2d.fillText("O",cx-maxR-8,cy+4);
  cx2d.textAlign="left"; cx2d.globalAlpha=1;
  // centro (tú) y aeropuerto
  cx2d.fillStyle=primary; cx2d.beginPath(); cx2d.arc(cx,cy,3,0,7); cx2d.fill();
  const g = scopePos({distMe:Math.min(distKm(S.home,GCLP),S.rangeKm), brgMe:bearing(S.home,GCLP)});
  cx2d.strokeStyle=primary; cx2d.globalAlpha=.8; cx2d.lineWidth=1.5;
  cx2d.beginPath(); cx2d.moveTo(g.x-5,g.y); cx2d.lineTo(g.x+5,g.y);
  cx2d.moveTo(g.x,g.y-5); cx2d.lineTo(g.x,g.y+5); cx2d.stroke(); cx2d.globalAlpha=1;
  // etiquetas
  cx2d.fillStyle=txt; cx2d.globalAlpha=.7; cx2d.font="9px "+getComputedStyle(document.body).fontFamily;
  cx2d.fillText("TÚ", cx+6, cy+13);
  cx2d.fillText("GCLP", g.x+7, g.y+3);
  cx2d.globalAlpha=1;
  // barrido
  const sweepRad=toRad(S.sweepAngle);
  if(S.sweep){
    // estela ancha con degradado (persistencia del fósforo)
    const TRAIL=110;             // grados de estela
    const STEPS=22;
    for(let i=0;i<STEPS;i++){
      const a0=sweepRad - toRad(TRAIL*(i+1)/STEPS);
      const a1=sweepRad - toRad(TRAIL*i/STEPS);
      cx2d.fillStyle=hexA(primary, .10*(1-i/STEPS)*(1-i/STEPS));
      cx2d.beginPath(); cx2d.moveTo(cx,cy);
      cx2d.arc(cx,cy,maxR, a0-Math.PI/2, a1-Math.PI/2, false);
      cx2d.closePath(); cx2d.fill();
    }
    // línea del barrido
    const grad=cx2d.createLinearGradient(cx,cy, cx+maxR*Math.sin(sweepRad), cy-maxR*Math.cos(sweepRad));
    grad.addColorStop(0, hexA(primary,.0)); grad.addColorStop(1, hexA(primary,.95));
    cx2d.strokeStyle=grad; cx2d.lineWidth=2; cx2d.beginPath();
    cx2d.moveTo(cx,cy); cx2d.lineTo(cx+maxR*Math.sin(sweepRad), cy-maxR*Math.cos(sweepRad)); cx2d.stroke();
  }
  // aviones
  for(const p of S.planes){
    if(S.filter!=="all" && p.status!==S.filter) continue;
    const pos=scopePos(p);
    const col=STATUS_COLOR[p.status]||primary;
    // persistencia de fósforo: máximo brillo al pasar el barrido,
    // se apaga poco a poco hasta la siguiente vuelta
    let bright=1;
    if(S.sweep){
      const since=((S.sweepAngle - p.brgMe)+360)%360;   // grados desde que lo barrió
      bright = 0.18 + 0.82*Math.exp(-since/95);
    }
    const sel = p.hex===S.selected;
    // estela: puntitos que se desvanecen con la antigüedad
    const trail=S.trails[p.hex];
    if(trail && trail.length>1){
      for(let i=0;i<trail.length-1;i++){
        const tp=trail[i];
        const tpos=scopePos({distMe:distKm(S.home,tp), brgMe:bearing(S.home,tp)});
        cx2d.globalAlpha=bright*0.45*((i+1)/trail.length);
        cx2d.fillStyle=col;
        cx2d.beginPath(); cx2d.arc(tpos.x,tpos.y,1.3,0,7); cx2d.fill();
      }
    }
    cx2d.globalAlpha=bright;
    drawPlane(cx2d, pos.x, pos.y, p.track, sel?7:5.5, col, sel);
    // etiqueta (evita solaparse en el borde derecho)
    cx2d.globalAlpha=Math.max(.6,bright);
    cx2d.fillStyle=txt; cx2d.font="10px "+getComputedStyle(document.body).fontFamily;
    const right = pos.x>cv._s-70;
    cx2d.textAlign = right?"right":"left";
    const lx = right? pos.x-10 : pos.x+10;
    cx2d.fillText(p.cs, lx, pos.y-2);
    cx2d.globalAlpha=Math.max(.45,bright*.8);
    cx2d.fillText(fmtAltShort(p), lx, pos.y+9);
    cx2d.textAlign="left"; cx2d.globalAlpha=1;
    // ping del barrido al cruzar un avión
    if(S.sweep){
      const since=((S.sweepAngle - p.brgMe)+360)%360;
      if(since<4){ if(!S.pingedThisTurn[p.hex]){ S.pingedThisTurn[p.hex]=true; beep("ping"); } }
      else if(since>20) S.pingedThisTurn[p.hex]=false;
    }
  }
}
function hexA(hex,a){ // #rrggbb -> rgba
  const n=hex.replace("#",""); const r=parseInt(n.slice(0,2),16),g=parseInt(n.slice(2,4),16),b=parseInt(n.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
// silueta de avión con el morro hacia el rumbo (track). Sin rumbo -> rombo.
function drawPlane(ctx, x, y, trackDeg, size, col, sel){
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=sel?12:6;
  if(trackDeg==null){
    ctx.rotate(Math.PI/4);
    ctx.fillRect(-size*.55,-size*.55,size*1.1,size*1.1);
  }else{
    ctx.rotate(toRad(trackDeg));
    const s=size;
    ctx.beginPath();
    ctx.moveTo(0,-1.35*s);          // morro
    ctx.lineTo(0.28*s,-0.25*s);     // fuselaje dcho
    ctx.lineTo(1.05*s, 0.28*s);     // ala dcha
    ctx.lineTo(1.05*s, 0.55*s);
    ctx.lineTo(0.22*s, 0.30*s);
    ctx.lineTo(0.20*s, 0.95*s);     // cola dcha
    ctx.lineTo(0.55*s, 1.25*s);
    ctx.lineTo(0,      1.05*s);     // cola centro
    ctx.lineTo(-0.55*s,1.25*s);
    ctx.lineTo(-0.20*s,0.95*s);
    ctx.lineTo(-0.22*s,0.30*s);
    ctx.lineTo(-1.05*s,0.55*s);     // ala izq
    ctx.lineTo(-1.05*s,0.28*s);
    ctx.lineTo(-0.28*s,-0.25*s);
    ctx.closePath(); ctx.fill();
  }
  ctx.shadowBlur=0;
  if(sel){ ctx.strokeStyle=col; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(0,0,size*2.1,0,7); ctx.stroke(); }
  ctx.restore();
}
let lastFrame=0;
function loop(ts){
  if(S.view==="scope"){
    if(S.sweep){ const dt=ts-lastFrame; S.sweepAngle=(S.sweepAngle + dt*0.12)%360; }
    drawScope();
  }
  lastFrame=ts;
  requestAnimationFrame(loop);
}
// tap en el scope -> seleccionar avión
cv.addEventListener("pointerdown", ev=>{
  const rect=cv.getBoundingClientRect();
  const px=(ev.clientX-rect.left), py=(ev.clientY-rect.top);
  let best=null, bd=22;
  for(const p of S.planes){
    if(S.filter!=="all" && p.status!==S.filter) continue;
    const pos=scopePos(p); const d=Math.hypot(pos.x-px,pos.y-py);
    if(d<bd){ bd=d; best=p; }
  }
  if(best) select(best.hex);
});

function planeIcon(p){
  const col=STATUS_COLOR[p.status]||THEMES[S.themeIdx][1];

function drawMap(){
  if(!map) return;

// ---- ruta del vuelo (origen → destino) ------------------------------------
// 1º adsb.lol routeset (la misma API que usa tar1090); 2º adsbdb.com de reserva.
// Se cachea por callsign para no repetir consultas.
const routeCache = {};
async function lookupRoute(p){
  const cs=(p.cs||"").trim();
  if(!cs || cs==="—") return null;
  if(cs in routeCache) return routeCache[cs];
  routeCache[cs]="…";                       // evita llamadas duplicadas en paralelo
  let route=null;
  // adsb.lol routeset
  try{
    const r=await fetch("https://api.adsb.lol/api/0/routeset",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({planes:[{callsign:cs, lat:p.lat, lng:p.lon}]})
    });
    if(r.ok){
      const j=await r.json();
      const e=Array.isArray(j)? j[0] : null;
      if(e && e.airport_codes && e.airport_codes!=="unknown"){
        const names=(e._airports||[]).map(a=>a.name||a.iata||a.icao);
        route={ codes:(e._airport_codes_iata||e.airport_codes), names };
      }
    }
  }catch(err){}
  // adsbdb de reserva
  if(!route){
    try{
      const r=await fetch("https://api.adsbdb.com/v0/callsign/"+encodeURIComponent(cs));
      if(r.ok){
        const j=await r.json();
        const fr=j&&j.response&&j.response.flightroute;
        if(fr&&fr.origin&&fr.destination){
          route={ codes:(fr.origin.iata_code||fr.origin.icao_code)+"-"+(fr.destination.iata_code||fr.destination.icao_code),
                  names:[fr.origin.name+" ("+(fr.origin.municipality||"")+")", fr.destination.name+" ("+(fr.destination.municipality||"")+")"] };
        }
      }
    }catch(err){}
  }
  routeCache[cs]=route;
  return route;
}
function routeHtml(route){
  if(route==="…") return `<div id="routeBand" style="padding:8px 10px;border-bottom:1px solid var(--line);font-size:12px;opacity:.6">Buscando ruta…</div>`;
  if(!route) return `<div id="routeBand" style="padding:8px 10px;border-bottom:1px solid var(--line);font-size:12px;opacity:.5">Ruta no disponible</div>`;
  const legs=(route.names&&route.names.length>=2)? route.names.join(" → ") : "";
  return `<div id="routeBand" style="padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px">
    🛫 <b>${route.codes.replace(/-/g," → ")}</b>${legs?`<div style="font-size:11px;opacity:.7;margin-top:2px">${legs}</div>`:""}</div>`;
}

// ---- modo noche automático -------------------------------------------------
// Calcula amanecer/atardecer para tu posición (ecuación solar aproximada, sin APIs).
const NIGHT_THEME = 3;   // "Stealth Red": rojo sobre negro, clásico de instrumentación nocturna
function isNightNow(){
  const now=new Date();
  const N=Math.floor((now-new Date(now.getFullYear(),0,0))/864e5);        // día del año
  const dec=-23.44*Math.cos(2*Math.PI/365*(N+10));                        // declinación solar
  const latR=toRad(S.home.lat), decR=toRad(dec);
  const cosH=(Math.sin(toRad(-0.83))-Math.sin(latR)*Math.sin(decR))/(Math.cos(latR)*Math.cos(decR));
  if(cosH>=1) return true;   // noche polar (no aplica en Canarias, por completitud)
  if(cosH<=-1) return false; // sol de medianoche
  const H=toDeg(Math.acos(cosH))/15;                                      // semiarco en horas
  const solarNoonUTC=12 - S.home.lon/15;                                  // mediodía solar aprox
  const hUTC=now.getUTCHours()+now.getUTCMinutes()/60;
  return hUTC < solarNoonUTC-H || hUTC > solarNoonUTC+H;
}
function nightTick(){
  if(!S.nightAuto) return;
  const night=isNightNow();
  if(night && !S.nightApplied){
    S.dayThemeIdx=S.themeIdx; store.set("dayTheme",S.dayThemeIdx);
    S.themeIdx=NIGHT_THEME; themeSel.value=NIGHT_THEME; applyTheme();
    S.nightApplied=true; toast("🌙 Modo noche");
  }else if(!night && S.nightApplied){
    S.themeIdx=S.dayThemeIdx; themeSel.value=S.themeIdx; applyTheme();
    S.nightApplied=false; toast("☀ Modo día");
  }
}
setInterval(nightTick, 60000);

function statusLabel(s){ return {salida:"Salida",llegada:"Llegada",ruta:"En ruta",tierra:"En tierra"}[s]||s; }
function fmtAltShort(p){ if(p.onGround) return "TIERRA"; if(p.alt==null) return "—"; return Math.round(p.alt*0.3048)+"m"; }
function metersOf(p){ return p.alt==null?null:Math.round(p.alt*0.3048); }

function renderPanel(){
  const c={all:S.planes.length,salida:0,llegada:0,ruta:0,tierra:0};
  for(const p of S.planes) c[p.status]=(c[p.status]||0)+1;
  document.getElementById("cTot").textContent=c.all;
  document.getElementById("cSal").textContent=c.salida;
  document.getElementById("cLle").textContent=c.llegada;
  document.getElementById("cRut").textContent=c.ruta;

  const list=document.getElementById("list");
  const items=S.planes.filter(p=>S.filter==="all"||p.status===S.filter);
  if(!items.length){ list.innerHTML=`<div class="empty">Sin tráfico en este filtro.<br>Prueba a ampliar el alcance.</div>`; }
  else{
    list.innerHTML=items.slice(0,40).map(p=>{
      const col=STATUS_COLOR[p.status]||THEMES[S.themeIdx][1];
      return `<div class="row ${p.hex===S.selected?'sel':''}" data-h="${p.hex}">
        <span class="tag" style="background:${col}"></span>
        <span class="cs">${p.cs}</span>
        <span class="meta">${fmtAltShort(p)}<br>${p.distMe.toFixed(0)} km</span></div>`;
    }).join("");
  }
  const age=S.lastOk?Math.round((Date.now()-S.lastOk)/1000):"—";
  const src=(S.srcUsed&&S.srcUsed.length)? S.srcUsed.join("+") : "—";
  setStatus(`${S.home.name} · ${S.planes.length} aviones a ≤${S.rangeKm} km · hace ${age}s · ${src}`);
  document.getElementById("loc").textContent=S.home.name;
  const st=S.stats;
  const cl=st.closest? ` · más cercano ${st.closest.cs} ${st.closest.km.toFixed(1)}km` : "";
  document.getElementById("sessLine").textContent=
    `SESIÓN: ${st.contacts.size} contactos · ${st.salidas.size}↑ salidas · ${st.llegadas.size}↓ llegadas${cl}`;
}
document.getElementById("list").addEventListener("click",e=>{
  const row=e.target.closest(".row"); if(row) select(row.dataset.h);
});

function select(hex){
  S.selected=hex; const p=S.byHex[hex]; if(!p) return;
  renderPanel();
  if(S.view==="map" && map){ map.panTo([p.lat,p.lon]); drawMap(); }
  const d=document.getElementById("detail"); d.classList.add("show");
  const m=metersOf(p);
  const kmh=p.gs!=null?Math.round(p.gs*1.852):null;
  const rate=p.rate?`${p.rate>0?'↑':'↓'} ${Math.abs(p.rate)} ft/min`:"—";
  const al=airline(p.cs);
  const pfx=(p.cs||"").trim().toUpperCase().slice(0,3);
  const alTxt = al || (/^[A-Z]{3}$/.test(pfx) ? `(${pfx} — sin identificar)` : "—");
  d.innerHTML=`
    <div class="dh"><span class="tag" style="background:${STATUS_COLOR[p.status]||THEMES[S.themeIdx][1]}"></span>
      <span class="cs">${p.cs}</span><span style="font-size:11px;opacity:.6">${statusLabel(p.status)}</span>
      <button class="x" id="detClose">✕</button></div>
    <div style="padding:8px 10px;border-bottom:1px solid var(--line);font-size:14px">✈ ${alTxt}</div>
    ${routeHtml((routeCache[(p.cs||"").trim()] != null ? routeCache[(p.cs||"").trim()] : "…"))}
    <div class="grid">
      <div class="g"><div class="k">MATRÍCULA</div><div class="v">${p.reg||"—"}</div></div>
      <div class="g"><div class="k">TIPO</div><div class="v">${p.type||"—"}</div></div>
      <div class="g"><div class="k">ALTITUD</div><div class="v">${p.onGround?"En tierra":(m!=null?m+" m ("+p.alt+" ft)":"—")}</div></div>
      <div class="g"><div class="k">VELOCIDAD</div><div class="v">${kmh!=null?kmh+" km/h":"—"}</div></div>
      <div class="g"><div class="k">RUMBO</div><div class="v">${p.track!=null?Math.round(p.track)+"°":"—"}</div></div>
      <div class="g"><div class="k">VERTICAL</div><div class="v">${rate}</div></div>
      <div class="g"><div class="k">DIST. A TI</div><div class="v">${p.distMe.toFixed(1)} km</div></div>
      <div class="g"><div class="k">DIST. GCLP</div><div class="v">${p.distGCLP.toFixed(1)} km</div></div>
      <div class="g"><div class="k">SQUAWK</div><div class="v">${p.squawk||"—"}</div></div>
      <div class="g"><div class="k">HEX</div><div class="v">${p.hex||"—"}</div></div>
    </div>
    <button class="say" id="sayBtn">🔊 LEER DATOS EN VOZ</button>`;
  document.getElementById("detClose").onclick=closeDetail;
  document.getElementById("sayBtn").onclick=()=>speakPlane(p);
  // busca la ruta en segundo plano y actualiza la banda al llegar
  lookupRoute(p).then(route=>{
    if(S.selected!==p.hex) return;                    // ya no está seleccionado
    const band=document.getElementById("routeBand");
    if(band) band.outerHTML=routeHtml(route);
    if(S.voice) speakPlane(p);                        // habla ya con la ruta
  });
  if(S.voice && routeCache[(p.cs||"").trim()]) speakPlane(p);
}
function closeDetail(){ S.selected=null; document.getElementById("detail").classList.remove("show"); renderPanel(); if(S.view==="map") drawMap(); }

// ============================ VOZ (Web Speech) ============================
function speakPlane(p){
  if(!("speechSynthesis" in window)) return;
  const m=metersOf(p), kmh=p.gs!=null?Math.round(p.gs*1.852):null;
  const cs=(p.cs==="—")?"vuelo desconocido":p.cs.split("").map(ch=>/[0-9]/.test(ch)?ch+" ":ch).join("").trim();
  const al=airline(p.cs);
  let t=`${al?al+". ":""}${cs}. ${statusLabel(p.status)}. `;
  const route=routeCache[(p.cs||"").trim()];
  if(route && route!=="…" && route.names && route.names.length>=2){
    t+=`De ${route.names[0]} a ${route.names[route.names.length-1]}. `;
  }
  if(!p.onGround && m!=null) t+=`Altitud ${m} metros. `;
  if(kmh!=null) t+=`Velocidad ${kmh} kilómetros por hora. `;
  t+=`A ${p.distMe.toFixed(0)} kilómetros de ti.`;
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang="es-ES"; u.rate=1.02; speechSynthesis.speak(u); }catch(e){}
}

// ============================ SONIDO (WebAudio) ============================
let actx=null;
function audio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==="suspended") actx.resume(); return actx; }
function beep(kind){
  if(!S.sound || S.vol<=0) return;
  const a=audio(); if(!a) return;
  const o=a.createOscillator(), g=a.createGain();
  o.type="sine"; o.frequency.value= kind==="new"?1320:2200;
  const v=[0,.04,.09,.16][S.vol]||.09;
  g.gain.setValueAtTime(v,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+(kind==="new"?0.18:0.05));
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+(kind==="new"?0.2:0.06));
}

// ============================ UI / CONTROLES ============================
function applyTheme(){
  const t=THEMES[S.themeIdx];
  document.documentElement.style.setProperty("--primary",t[1]);
  document.documentElement.style.setProperty("--grid",t[2]);
  document.documentElement.style.setProperty("--txt",t[3]);
  document.documentElement.style.setProperty("--ruta",t[1]);
  STATUS_COLOR.ruta=t[1];
  if(map) updateRangeCircle();
}
function setStatus(s){ document.getElementById("statusLine").textContent=s; }
function toast(s){ const el=document.getElementById("toast"); el.textContent=s; el.classList.add("show"); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),2600); }
function setLive(on){ const d=document.getElementById("liveDot"), t=document.getElementById("liveTxt");
  d.style.background=on?"#ff3b3b":"#666"; d.style.boxShadow=on?"0 0 8px #ff3b3b":"none"; t.textContent=on?"EN VIVO":"SIN SEÑAL"; }

function setView(v){
  S.view=v; store.set("view",v);
  document.querySelectorAll("#viewSeg button").forEach(b=>b.classList.toggle("on",b.dataset.v===v));
  document.getElementById("scopeWrap").style.display = v==="scope"?"flex":"none";
  document.getElementById("map").style.display = v==="map"?"block":"none";
  if(v==="map"){ initMap(); setTimeout(()=>{ map.invalidateSize(); drawMap(); },60); }
  else sizeScope();
}

// tema selector
const themeSel=document.getElementById("themeSel");
THEMES.forEach((t,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=t[0]; themeSel.appendChild(o); });
themeSel.value=S.themeIdx;
themeSel.onchange=()=>{ S.themeIdx=+themeSel.value; store.set("theme",S.themeIdx); applyTheme(); };

// alcance
const rangeSlider=document.getElementById("rangeSlider"), rangeVal=document.getElementById("rangeVal");
rangeSlider.value=S.rangeKm; rangeVal.textContent=S.rangeKm+" km";
rangeSlider.oninput=()=>{ S.rangeKm=+rangeSlider.value; rangeVal.textContent=S.rangeKm+" km"; };
rangeSlider.onchange=()=>{ store.set("range",S.rangeKm); if(map) updateRangeCircle(); };

// vistas
document.querySelectorAll("#viewSeg button").forEach(b=>b.onclick=()=>setView(b.dataset.v));
// filtros
document.querySelectorAll("#filters button").forEach(b=>b.onclick=()=>{
  S.filter=b.dataset.f;
  document.querySelectorAll("#filters button").forEach(x=>x.classList.toggle("on",x===b));
  renderPanel(); if(S.view==="map") drawMap();
});
// sonido / voz / barrido
const soundBtn=document.getElementById("soundBtn"), volSlider=document.getElementById("volSlider");
soundBtn.classList.toggle("on",S.sound); volSlider.value=S.vol;
soundBtn.onclick=()=>{ S.sound=!S.sound; store.set("sound",S.sound); soundBtn.classList.toggle("on",S.sound); soundBtn.textContent="SONIDO "+(S.sound?"◑":"○"); if(S.sound){audio();beep("ping");} };
soundBtn.textContent="SONIDO "+(S.sound?"◑":"○");
volSlider.oninput=()=>{ S.vol=+volSlider.value; store.set("vol",S.vol); if(S.sound&&S.vol>0)beep("ping"); };
const voiceBtn=document.getElementById("voiceBtn");
voiceBtn.classList.toggle("on",S.voice);
voiceBtn.onclick=()=>{ S.voice=!S.voice; store.set("voice",S.voice); voiceBtn.classList.toggle("on",S.voice); if(S.voice){try{const u=new SpeechSynthesisUtterance("Voz activada");u.lang="es-ES";speechSynthesis.speak(u);}catch(e){}} };
const sweepBtn=document.getElementById("sweepBtn");
sweepBtn.classList.toggle("on",S.sweep);
sweepBtn.onclick=()=>{ S.sweep=!S.sweep; store.set("sweep",S.sweep); sweepBtn.classList.toggle("on",S.sweep); };
// alerta de cercanía
const alertSel=document.getElementById("alertSel");
alertSel.value=String(S.alertKm);
alertSel.onchange=()=>{ S.alertKm=+alertSel.value; store.set("alertKm",S.alertKm); S.alertedHex.clear();
  toast(S.alertKm?`Alerta al entrar a ≤${S.alertKm} km`:"Alerta de cercanía apagada"); };
// modo noche automático
const nightBtn=document.getElementById("nightBtn");
nightBtn.classList.toggle("on",S.nightAuto);
nightBtn.onclick=()=>{ S.nightAuto=!S.nightAuto; store.set("nightAuto",S.nightAuto);
  nightBtn.classList.toggle("on",S.nightAuto);
  if(S.nightAuto){ toast("Cambio día/noche automático activado"); nightTick(); }
  else if(S.nightApplied){ S.themeIdx=S.dayThemeIdx; themeSel.value=S.themeIdx; applyTheme(); S.nightApplied=false; } };
// ubicación manual (lat, lon a mano)
function askManualLocation(){
  const cur=`${S.home.lat.toFixed(4)}, ${S.home.lon.toFixed(4)}`;
  const v=prompt("Escribe la ubicación como: latitud, longitud\n(en el mapa: mantén pulsado un punto para fijarla ahí)", cur);
  if(!v) return;
  const m=v.split(/[,;\s]+/).map(Number).filter(n=>!isNaN(n));
  if(m.length>=2 && Math.abs(m[0])<=90 && Math.abs(m[1])<=180){
    S.home={lat:m[0], lon:m[1], name:"Manual"}; store.set("home",S.home);
    toast("Ubicación fijada manualmente");
    if(map){ map.setView([S.home.lat,S.home.lon],9); homeMarker.setLatLng([S.home.lat,S.home.lon]); updateRangeCircle(); }
    renderPanel();
  }else toast("No entendí las coordenadas. Formato: 27.8450, -15.4390");
}
// ubícame
document.getElementById("locBtn").onclick=()=>{
  // fuera de HTTPS/localhost el navegador BLOQUEA la geolocalización sin preguntar
  if(!window.isSecureContext || !navigator.geolocation){
    toast("El GPS solo funciona abriendo la web por HTTPS (p.ej. GitHub Pages). Te dejo ponerla a mano.");
    setTimeout(askManualLocation, 600);
    return;
  }
  toast("Buscando tu ubicación…");
  navigator.geolocation.getCurrentPosition(pos=>{
    S.home={ lat:pos.coords.latitude, lon:pos.coords.longitude, name:"Mi ubicación" };
    store.set("home",S.home); toast("Ubicación fijada"); if(map){map.setView([S.home.lat,S.home.lon],9); homeMarker.setLatLng([S.home.lat,S.home.lon]); updateRangeCircle();}
    renderPanel();
  }, err=>{
    toast("Sin permiso de ubicación. Puedes ponerla a mano.");
    setTimeout(askManualLocation, 600);
  }, {enableHighAccuracy:true, timeout:8000});
};

// modo cuadro: pantalla completa + mantener la pantalla encendida (Wake Lock)
let wakeLock=null;
async function keepAwake(on){
  try{
    if(on && "wakeLock" in navigator){ wakeLock=await navigator.wakeLock.request("screen"); }
    else if(!on && wakeLock){ await wakeLock.release(); wakeLock=null; }
  }catch(e){}
}
// si la pestaña vuelve a estar visible, re-adquiere el wake lock
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible" && document.fullscreenElement) keepAwake(true); });
const fsBtn=document.getElementById("fsBtn");
fsBtn.onclick=async ()=>{
  if(!document.fullscreenElement){
    try{ await document.documentElement.requestFullscreen(); }catch(e){}
    keepAwake(true);
  }else{
    try{ await document.exitFullscreen(); }catch(e){}
    keepAwake(false);
  }
};
document.addEventListener("fullscreenchange",()=>{
  fsBtn.classList.toggle("on", !!document.fullscreenElement);
  if(!document.fullscreenElement) keepAwake(false);
  setTimeout(()=>{ if(S.view==="scope") sizeScope(); else if(map) map.invalidateSize(); },120);
});

// resume audio en primer toque (política de navegadores)
["pointerdown","keydown"].forEach(ev=>window.addEventListener(ev,()=>audio(),{once:true}));
window.addEventListener("resize",()=>{ if(S.view==="scope") sizeScope(); else if(map) map.invalidateSize(); });

// ============================ ARRANQUE ============================
applyTheme();
setView(S.view);
sizeScope();
requestAnimationFrame(loop);
poll();
nightTick();
// solo la PRIMERA vez (sin ubicación guardada) intenta localizarte automáticamente
if(navigator.geolocation && store.get("home",null)===null){
  navigator.geolocation.getCurrentPosition(pos=>{
    S.home={lat:pos.coords.latitude,lon:pos.coords.longitude,name:"Mi ubicación"};
    store.set("home",S.home); renderPanel();
    if(map){ map.setView([S.home.lat,S.home.lon],9); homeMarker.setLatLng([S.home.lat,S.home.lon]); updateRangeCircle(); }
  }, ()=>{}, {timeout:5000});
}
</script>
